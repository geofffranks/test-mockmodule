name: lint

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  perlcritic:
    name: Perl::Critic (gentle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install Perl::Critic
        uses: perl-actions/install-with-cpm@v2
        with:
          install: |
            Perl::Critic
      - name: run perlcritic
        run: perlcritic --gentle lib/ t/
